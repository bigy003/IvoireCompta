version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ivoirecompta_db
    environment:
      POSTGRES_USER: ivoirecompta
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ivoirecompta_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ivoirecompta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ivoirecompta_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Optionnel : interface admin base de données
  adminer:
    image: adminer:latest
    container_name: ivoirecompta_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
